<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frame Painter</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f11;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .layout {
      display: flex;
      align-items: center;
      gap: 80px;
      max-width: 1100px;
      width: 100%;
    }

    /* ── Left panel ── */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 32px;
      flex-shrink: 0;
      width: 280px;
    }

    .controls-header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #fafafa;
      line-height: 1.15;
    }

    .controls-header p {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #71717a;
      font-weight: 300;
      line-height: 1.6;
    }

    .picker-section {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .picker-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #52525b;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .swatch-btn {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.1);
      cursor: pointer;
      flex-shrink: 0;
      transition: box-shadow 0.15s, border-color 0.15s;
      background: #c9a84c;
    }

    .swatch-btn:hover {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.2);
    }

    input[type="color"] {
      position: absolute;
      width: 0; height: 0; opacity: 0;
      pointer-events: none;
    }

    .hex-input {
      flex: 1;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      color: #fafafa;
      font-family: 'Inter', monospace;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 0 16px;
      height: 48px;
      outline: none;
      transition: border-color 0.15s;
    }

    .hex-input:focus { border-color: #52525b; }
    .hex-input::placeholder { color: #3f3f46; }
    .hex-input.error { border-color: #ef4444; }

    .repaint-btn {
      width: 100%;
      height: 52px;
      background: #c9a84c;
      color: #1a0f00;
      border: none;
      border-radius: 12px;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s, background 0.3s;
    }

    .repaint-btn:hover  { filter: brightness(1.12); }
    .repaint-btn:active { transform: scale(0.97); }

    .hint {
      font-size: 0.78rem;
      color: #3f3f46;
      line-height: 1.5;
    }

    /* ── Right panel: painting ── */
    .painting-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .frame-outer {
      padding: 22px;
      border-radius: 4px;
      transition: background 0.5s ease, box-shadow 0.5s ease;
    }

    .frame-inner {
      padding: 10px;
      transition: background 0.5s ease, box-shadow 0.5s ease;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
    }

    .frame-mat {
      background: #1a1208;
      padding: 16px;
    }

    .frame-img {
      display: block;
      max-width: 480px;
      width: 100%;
      height: auto;
    }

    .painting-label {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .painting-nameplate {
      color: #2a1800;
      font-family: 'Playfair Display', 'Georgia', serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 8px 32px;
      border-radius: 2px;
      transition: background 0.5s ease, box-shadow 0.5s ease;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #27272a;
      border: 1px solid #3f3f46;
      color: #e4e4e7;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 780px) {
      .layout {
        flex-direction: column-reverse;
        gap: 48px;
        align-items: center;
      }
      .controls { width: 100%; max-width: 360px; }
    }
  </style>
</head>
<body>

  <div class="layout">

    <!-- Left: controls -->
    <div class="controls">
      <div class="controls-header">
        <h1>Frame Painter</h1>
        <p>Choose a color and repaint the frame around Аркаша.</p>
      </div>

      <div class="picker-section">
        <div class="picker-label">Frame color</div>
        <div class="color-row">
          <div class="swatch-btn" id="swatchBtn" title="Open color picker"></div>
          <input type="color" id="colorPicker" value="#c9a84c" tabindex="-1" />
          <input class="hex-input" id="hexInput" type="text" maxlength="7" placeholder="#c9a84c" spellcheck="false" />
        </div>
      </div>

      <button class="repaint-btn" id="repaintBtn">Repaint!</button>

      <p class="hint">Click the color swatch to open the color picker, or type a hex code directly.</p>
    </div>

    <!-- Right: painting -->
    <div class="painting-side">
      <div class="frame-outer" id="frameOuter">
        <div class="frame-inner" id="frameInner">
          <div class="frame-mat">
            <img class="frame-img" src="Аркадий оперный.png" alt="Аркаша" />
          </div>
        </div>
      </div>
      <div class="painting-label">
        <div class="painting-nameplate" id="nameplate">Аркаша</div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    const hexInput    = document.getElementById('hexInput');
    const colorPicker = document.getElementById('colorPicker');
    const swatchBtn   = document.getElementById('swatchBtn');
    const repaintBtn  = document.getElementById('repaintBtn');
    const frameOuter  = document.getElementById('frameOuter');
    const frameInner  = document.getElementById('frameInner');
    const nameplate   = document.getElementById('nameplate');
    const toast       = document.getElementById('toast');

    // ── Color utilities ──────────────────────────────────────

    function hexToRgb(hex) {
      hex = hex.replace(/^#/, '');
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
      const n = parseInt(hex, 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function rgbToHsl({ r, g, b }) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) { h = s = 0; }
      else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return { h: h * 360, s: s * 100, l: l * 100 };
    }

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const k = n => (n + h / 30) % 12;
      const a = s * Math.min(l, 1 - l);
      const f = n => Math.round((l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)))) * 255);
      return '#' + [f(0), f(8), f(4)].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function isValidHex(v) {
      return /^#?([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(v.trim());
    }

    function normalizeHex(v) {
      v = v.trim().replace(/^#/, '');
      if (v.length === 3) v = v.split('').map(c => c + c).join('');
      return '#' + v.toLowerCase();
    }

    // Make a lighter/darker variant of a hex color
    function shiftLightness(hex, delta) {
      const { h, s, l } = rgbToHsl(hexToRgb(hex));
      return hslToHex(h, s, Math.max(0, Math.min(100, l + delta)));
    }

    // ── Apply frame color ────────────────────────────────────

    function applyFrameColor(hex) {
      const light  = shiftLightness(hex, +22);
      const dark   = shiftLightness(hex, -22);
      const vdark  = shiftLightness(hex, -38);

      frameOuter.style.background =
        `linear-gradient(135deg, ${dark} 0%, ${light} 25%, ${dark} 50%, ${light} 75%, ${dark} 100%)`;
      frameOuter.style.boxShadow =
        `0 0 0 3px ${vdark}, 0 0 0 6px ${dark}, 0 8px 40px rgba(0,0,0,0.7), inset 0 0 12px rgba(0,0,0,0.3)`;

      frameInner.style.background =
        `linear-gradient(135deg, ${vdark} 0%, ${dark} 30%, ${vdark} 60%, ${dark} 100%)`;

      nameplate.style.background =
        `linear-gradient(135deg, ${dark}, ${light}, ${dark}, ${light}, ${dark})`;
      nameplate.style.boxShadow =
        `0 0 0 2px ${vdark}, 0 4px 12px rgba(0,0,0,0.5)`;

      // Also tint the repaint button to match
      repaintBtn.style.background = hex;

      // Dark text if color is light, light text if dark
      const { l } = rgbToHsl(hexToRgb(hex));
      repaintBtn.style.color = l > 55 ? '#1a0f00' : '#ffffff';
      nameplate.style.color  = l > 55 ? '#1a0f00' : '#ffffff';
    }

    // ── UI interactions ──────────────────────────────────────

    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function repaint() {
      let val = hexInput.value.trim();
      if (!val.startsWith('#')) val = '#' + val;
      if (!isValidHex(val)) {
        hexInput.classList.add('error');
        setTimeout(() => hexInput.classList.remove('error'), 1200);
        showToast('Enter a valid hex color');
        return;
      }
      const hex = normalizeHex(val);
      hexInput.value = hex;
      swatchBtn.style.background = hex;
      colorPicker.value = hex;
      applyFrameColor(hex);
    }

    // Live swatch preview as user types
    hexInput.addEventListener('input', () => {
      let val = hexInput.value.trim();
      if (!val.startsWith('#')) val = '#' + val;
      if (isValidHex(val)) {
        const hex = normalizeHex(val);
        swatchBtn.style.background = hex;
        colorPicker.value = hex;
      }
    });

    hexInput.addEventListener('keydown', e => { if (e.key === 'Enter') repaint(); });
    repaintBtn.addEventListener('click', repaint);

    // Open color picker on swatch click
    swatchBtn.addEventListener('click', () => colorPicker.click());

    // Sync color picker → hex input + swatch
    colorPicker.addEventListener('input', () => {
      hexInput.value = colorPicker.value;
      swatchBtn.style.background = colorPicker.value;
    });

    colorPicker.addEventListener('change', () => {
      hexInput.value = colorPicker.value;
      repaint();
    });

    // ── Seed with default gold ────────────────────────────────
    const defaultColor = '#c9a84c';
    hexInput.value = defaultColor;
    swatchBtn.style.background = defaultColor;
    colorPicker.value = defaultColor;
    applyFrameColor(defaultColor);
  </script>
</body>
</html>
