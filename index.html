<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Palette Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f11;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 52px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #fafafa;
    }

    header p {
      margin-top: 8px;
      font-size: 0.925rem;
      color: #71717a;
      font-weight: 300;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 56px;
    }

    .swatch-preview {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #6366f1;
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.15s;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
    }

    .swatch-preview:hover {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.12);
    }

    .input-wrapper {
      position: relative;
    }

    input[type="color"] {
      position: absolute;
      width: 0;
      height: 0;
      padding: 0;
      border: none;
      opacity: 0;
      pointer-events: none;
      top: 100%;
      left: 0;
    }

    .hex-input {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 10px;
      color: #fafafa;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 0 16px;
      height: 44px;
      width: 148px;
      outline: none;
      transition: border-color 0.15s;
    }

    .hex-input:focus {
      border-color: #52525b;
    }

    .hex-input::placeholder { color: #52525b; }

    .btn {
      height: 44px;
      padding: 0 24px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover  { background: #4f52d4; }
    .btn:active { transform: scale(0.97); }

    .palette {
      display: flex;
      gap: 0;
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 900px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    .swatch {
      flex: 1;
      height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 14px 10px;
      cursor: pointer;
      position: relative;
      transition: flex 0.25s ease;
      overflow: hidden;
    }

    .swatch:hover { flex: 1.8; }

    .swatch-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .swatch:hover .swatch-label { opacity: 1; transform: translateY(0); }

    .swatch-hex {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    .swatch-num {
      font-size: 0.65rem;
      font-weight: 400;
      opacity: 0.65;
      letter-spacing: 0.05em;
    }

    .copy-hint {
      font-size: 0.6rem;
      opacity: 0.5;
      letter-spacing: 0.04em;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #27272a;
      border: 1px solid #3f3f46;
      color: #e4e4e7;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .empty-state {
      width: 100%;
      max-width: 900px;
      height: 200px;
      border-radius: 16px;
      border: 1.5px dashed #27272a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3f3f46;
      font-size: 0.9rem;
      letter-spacing: 0.02em;
    }

    /* ── Museum frame ── */
    .museum-section {
      margin-top: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .frame-outer {
      padding: 22px;
      background:
        linear-gradient(135deg, #c9a84c 0%, #f5e29a 25%, #a8722a 50%, #f5e29a 75%, #c9a84c 100%);
      border-radius: 4px;
      box-shadow:
        0 0 0 3px #7a4f1a,
        0 0 0 6px #c9a84c,
        0 8px 40px rgba(0,0,0,0.7),
        inset 0 0 12px rgba(0,0,0,0.3);
    }

    .frame-inner {
      padding: 10px;
      background:
        linear-gradient(135deg, #7a4f1a 0%, #c9a84c 30%, #7a4f1a 60%, #c9a84c 100%);
      box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
    }

    .frame-mat {
      background: #1a1208;
      padding: 16px;
    }

    .frame-img {
      display: block;
      max-width: 500px;
      width: 100%;
      height: auto;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
    }

    .painting-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .painting-nameplate {
      background: linear-gradient(135deg, #c9a84c, #f5e29a, #a8722a, #f5e29a, #c9a84c);
      color: #2a1800;
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 8px 32px;
      border-radius: 2px;
      box-shadow:
        0 0 0 2px #7a4f1a,
        0 4px 12px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <header>
    <h1>Color Palette Generator</h1>
    <p>Enter a hex color to generate 10 shades from light to dark.</p>
  </header>

  <div class="input-row">
    <div class="input-wrapper">
      <div class="swatch-preview" id="preview" title="Pick a color"></div>
      <input type="color" id="colorPicker" value="#6366f1" tabindex="-1" />
    </div>
    <input class="hex-input" id="hexInput" type="text" maxlength="7" placeholder="#6366f1" spellcheck="false" />
    <button class="btn" id="generateBtn">Generate</button>
  </div>

  <div id="paletteContainer">
    <div class="empty-state">Your palette will appear here</div>
  </div>

  <div class="museum-section">
    <div class="frame-outer">
      <div class="frame-inner">
        <div class="frame-mat">
          <img class="frame-img" src="Аркадий оперный.png" alt="Аркаша" />
        </div>
      </div>
    </div>
    <div class="painting-label">
      <div class="painting-nameplate">Аркаша</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const hexInput    = document.getElementById('hexInput');
    const colorPicker = document.getElementById('colorPicker');
    const preview     = document.getElementById('preview');
    const generateBtn = document.getElementById('generateBtn');
    const container   = document.getElementById('paletteContainer');
    const toast       = document.getElementById('toast');

    // ── Helpers ──────────────────────────────────────────────

    function hexToRgb(hex) {
      hex = hex.replace(/^#/, '');
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
      const n = parseInt(hex, 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function rgbToHsl({ r, g, b }) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) { h = s = 0; }
      else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return { h: h * 360, s: s * 100, l: l * 100 };
    }

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const k = n => (n + h / 30) % 12;
      const a = s * Math.min(l, 1 - l);
      const f = n => Math.round((l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)))) * 255);
      return '#' + [f(0), f(8), f(4)].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function isValidHex(v) {
      return /^#?([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(v.trim());
    }

    function normalizeHex(v) {
      v = v.trim().replace(/^#/, '');
      if (v.length === 3) v = v.split('').map(c => c + c).join('');
      return '#' + v.toLowerCase();
    }

    function getLuminance(hex) {
      const { r, g, b } = hexToRgb(hex);
      const toLinear = c => { c /= 255; return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); };
      return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }

    function textColor(hex) {
      return getLuminance(hex) > 0.35 ? '#1a1a1a' : '#ffffff';
    }

    // ── Palette generation ────────────────────────────────────

    function generateShades(hex) {
      const { h, s } = rgbToHsl(hexToRgb(hex));
      // 10 steps: lightness from 95 → 10, keeping hue & saturation
      // slightly reduce saturation at extremes for realism
      return Array.from({ length: 10 }, (_, i) => {
        const t = i / 9;                          // 0 = lightest, 1 = darkest
        const l = 95 - t * 85;                    // 95% → 10%
        const sFactor = 1 - 0.3 * (1 - Math.sin(Math.PI * (1 - t)));
        return hslToHex(h, Math.min(s * sFactor, 100), l);
      });
    }

    // ── UI ────────────────────────────────────────────────────

    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function buildPalette(shades) {
      container.innerHTML = '';
      const palette = document.createElement('div');
      palette.className = 'palette';

      shades.forEach((hex, i) => {
        const sw = document.createElement('div');
        sw.className = 'swatch';
        sw.style.background = hex;

        const fg = textColor(hex);
        sw.style.color = fg;

        sw.innerHTML = `
          <div class="swatch-label">
            <span class="swatch-hex" style="color:${fg}">${hex}</span>
            <span class="swatch-num" style="color:${fg}">${(i + 1) * 100}</span>
            <span class="copy-hint" style="color:${fg}">click to copy</span>
          </div>`;

        sw.addEventListener('click', () => {
          navigator.clipboard.writeText(hex).then(() => showToast(`Copied ${hex}`));
        });

        palette.appendChild(sw);
      });

      container.appendChild(palette);
    }

    function generate() {
      let val = hexInput.value.trim();
      if (!val.startsWith('#')) val = '#' + val;
      if (!isValidHex(val)) {
        hexInput.style.borderColor = '#ef4444';
        setTimeout(() => hexInput.style.borderColor = '', 1200);
        return;
      }
      const hex = normalizeHex(val);
      hexInput.value = hex;
      preview.style.background = hex;
      buildPalette(generateShades(hex));
    }

    // live preview as user types
    hexInput.addEventListener('input', () => {
      let val = hexInput.value.trim();
      if (!val.startsWith('#')) val = '#' + val;
      if (isValidHex(val)) {
        const hex = normalizeHex(val);
        preview.style.background = hex;
        colorPicker.value = hex;
      }
    });

    hexInput.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
    generateBtn.addEventListener('click', generate);

    // Open native color picker when the color swatch is clicked
    preview.addEventListener('click', () => colorPicker.click());

    // Sync color picker → hex input, live preview, and palette
    colorPicker.addEventListener('input', () => {
      const hex = colorPicker.value;
      hexInput.value = hex;
      preview.style.background = hex;
    });

    colorPicker.addEventListener('change', () => {
      hexInput.value = colorPicker.value;
      generate();
    });

    // seed with default
    hexInput.value = '#6366f1';
    preview.style.background = '#6366f1';
    generate();
  </script>
</body>
</html>
